name: Application 

on:
  push:
    branches: [ main ]
    paths: ['karavan-app/**', 'karavan-core/**', '.github/workflows/app.yml']
  workflow_dispatch:
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io
  TAG: 4.18.2

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Karavan
        uses: actions/checkout@v6
        with:
          path: karavan

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
          cache-dependency-path: |
            karavan/**/*.gradle
            karavan/gradle.properties
            karavan/settings.gradle

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Build application
        working-directory: ./karavan
        # Jib builds the multi-arch image and pushes the manifest straight to the
        # registry — no Docker daemon / buildx needed (multi-platform can't load to a
        # local daemon, so this is push-only).
        run: |
          ./gradlew :karavan-app:quarkusBuild --no-daemon \
          -Dquarkus.quinoa.package-manager-install=false \
          -Dquarkus.container-image.push=${{ github.event_name != 'pull_request' }} \
          -Dquarkus.jib.platforms=linux/amd64,linux/arm64 \
          -Dquarkus.container-image.image=${{ env.REGISTRY }}/${GITHUB_REPOSITORY}:${{ env.TAG }} \
          -Dquarkus.container-image.username=${{ github.actor }} \
          -Dquarkus.container-image.password=${{ secrets.GITHUB_TOKEN }}
        if: ${{ github.ref == 'refs/heads/main' }}
