# jkube merges this into the generated Deployment (camel-main / spring-boot). The
# org.apache.camel.karavan/type=packaged label marks the deployed pod as the project's
# "packaged" runtime container so PodEventHandler types it correctly and the UI lists it
# as the running app (projectId is resolved by jkube's app label -> deployment name).
metadata:
  labels:
    org.apache.camel.karavan/type: packaged
spec:
  replicas: 1
  template:
    metadata:
      labels:
        org.apache.camel.karavan/type: packaged
    spec:
      serviceAccount: karavan
      # Explicit container: Camel >=4.18 exports carry no jib/jkube plugins, so no
      # jkube generator runs (resource-only mode) and without this the generated
      # Deployment has zero containers (422 Required value). jkube interpolates
      # ${...} with Maven properties; jkube.image.name is passed by build.sh.
      containers:
        - name: ${project.artifactId}
          image: ${jkube.image.name}
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
