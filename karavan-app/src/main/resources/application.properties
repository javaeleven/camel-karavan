karavan.appName=karavan
karavan.title=Apache Camel Karavan
karavan.version=4.18.2

karavan.camel.status.interval=5s
karavan.container.status.interval=3s
# karavan.container.status.interval should be off in kubernetes

karavan.container.statistics.interval=10s
# karavan.container.statistics.interval should be off in kubernetes

# The devmode image is BUILT IN-APP with Jib Core at startup (no Docker daemon,
# no pre-built pipeline): plain maven base + layered JBang + platform Camel
# version, pushed to karavan.devmode.image using the container-image registry
# credentials. See docs/DEVMODE_IMAGE_JIB.md.
karavan.devmode.image=${KARAVAN_DEVMODE_IMAGE:registry:5000/karavan/karavan-devmode:4.18.2}
# Auto-push changed files into a RUNNING devmode container (debounced) on UI
# save/rename/delete and after git pull — same flow as the manual Reload button.
karavan.devmode.hot-reload=${KARAVAN_DEVMODE_HOT_RELOAD:true}
karavan.devmode.build.enabled=true
karavan.devmode.build.base-image=maven:3.9-eclipse-temurin-21
karavan.devmode.build.jbang-version=0.139.3
# Default Camel/Quarkus versions seeded into NEW projects (camel.jbang.camelVersion /
# camel.jbang.quarkusVersion in the project's application.properties). Keep at the
# latest Camel LTS; users can change the version per-project — jbang picks it up for
# both devmode and build/export. Override platform-wide via KARAVAN_CAMEL_VERSION.
karavan.camel.version=4.18.2
karavan.camel.quarkus-version=3.27.0
karavan.devmode.service.account=karavan
karavan.builder.service.account=karavan
karavan.secret.name=karavan
karavan.docker.network=karavan

# Keycloak configuration
karavan.keycloak.url=http://localhost:8079
karavan.keycloak.realm=karavan
karavan.keycloak.backend.clientId=backend
karavan.keycloak.backend.secret=karavan

# Git is per-project: every project carries its own repository + branch and is
# pushed/pulled with the owning user's credentials (System -> Git). There is no
# global/service-account repository. Optional SSH key material below is only
# mounted into build containers; the control plane authenticates over HTTPS.
karavan.private-key-path=
karavan.known-hosts-path=

# Container mage registry configuration
karavan.container-image.registry=registry:5000
karavan.container-image.group=karavan
karavan.container-image.registry-username=
karavan.container-image.registry-password=

# Authentication
# Auth is SSO-only for humans (OIDC BFF); the session cookie mechanism only serves
# machine callers (build containers). "session" is kept as a value for the SPA switch.
platform.auth=oidc
quarkus.http.auth.proactive=false
quarkus.http.auth.permission.public.paths=/public/*,/static/*,/robots.txt,/favicon.ico
quarkus.http.auth.permission.public.policy=permit
quarkus.http.auth.permission.public.methods=GET
# Secure /auth/* (OIDC login + code-flow callback) and /logout so the OIDC
# mechanism runs on them even with proactive auth disabled — otherwise these
# paths have no security constraint, the mechanism never fires, and Quarkus
# returns 404 "Resource not found" for the IdP redirect back / the logout.
quarkus.http.auth.permission.auth.paths=/auth/*,/logout
quarkus.http.auth.permission.auth.policy=authenticated

# SSO Authentication.
# Auth mode is selected at runtime by the PLATFORM_AUTH env var (PLATFORM_AUTH=oidc
# from the Helm chart); platform.auth defaults to 'oidc' above.
# The quarkus.oidc.* block below is the Keycloak local-dev default. Auth0 deployments
# override auth-server-url / token.audience / roles.role-claim-path / client-id /
# credentials.secret and set tenant-enabled=true via QUARKUS_OIDC_* env (deploy/helm/karavan).
quarkus.oidc.enabled=true
quarkus.oidc.tenant-enabled=false
# make dev (profile "local"): compose.yaml runs Keycloak on :8079 with the karavan
# realm pre-imported, so SSO login works locally (admin/karavan, developer/karavan).
%local.quarkus.oidc.tenant-enabled=true
# Keycloak puts realm roles into the "roles" claim (client mapper in the realm import).
%local.quarkus.oidc.roles.role-claim-path=roles
quarkus.http.auth.basic=false
quarkus.oidc.auth-server-url=${karavan.keycloak.url}/realms/${karavan.keycloak.realm}
quarkus.oidc.client-id=${karavan.keycloak.backend.clientId}
quarkus.oidc.credentials.secret=${karavan.keycloak.backend.secret}
# Roles live in the ID token (the IdP Action adds the namespaced roles claim to
# it). Reading them from the id_token avoids forcing the API audience onto the
# id_token (whose aud is the client_id) — which would fail id_token verification.
quarkus.oidc.roles.source=idtoken

# Backend-for-Frontend (BFF): Quarkus runs the OIDC Authorization Code flow
# server-side and keeps the tokens in an encrypted session cookie; the SPA never
# handles a token. The SPA calls /ui/* with the cookie and is sent to
# /auth/login (full-page) to start the flow.
quarkus.oidc.application-type=web-app
quarkus.oidc.authentication.redirect-path=/auth/callback
quarkus.oidc.authentication.restore-path-after-redirect=true
# On an auth failure (e.g. token verification), surface it on /login instead of
# bouncing back to the IdP — which (with an active IdP session) tight-loops.
quarkus.oidc.authentication.error-path=/login
# For XHR/fetch, answer 401 instead of a cross-origin 302 to the IdP (the SPA
# turns that into a full-page navigation to /auth/login).
quarkus.oidc.authentication.java-script-auto-redirect=false
# openid is always added by Quarkus; list only the extra scopes here.
quarkus.oidc.authentication.scopes=profile,email,offline_access
quarkus.oidc.token.refresh-expired=true
# Use the IdP email claim as the principal so OIDC users get a friendly username
# (instead of the opaque "sub"); /ui/auth/me then shows the email.
quarkus.oidc.token.principal-claim=email
# Store id/access/refresh tokens in separate cookies so a large Auth0 JWT access
# token (audience-scoped + roles) doesn't blow the ~4KB single-cookie limit.
quarkus.oidc.token-state-manager.split-tokens=true
quarkus.oidc.logout.path=/logout
quarkus.oidc.logout.post-logout-path=/login

# Quarkus configuration
quarkus.http.enable-compression=true
quarkus.log.level=INFO
quarkus.banner.enabled=false
quarkus.package.jar.type=uber-jar
# Container image is built by Quarkus Jib (no Dockerfile). The default base image
# (ubi9/openjdk-21-runtime) is multi-arch (amd64+arm64), matching the previous build.
quarkus.container-image.builder=jib
# Preserve the labels the old src/main/docker/Dockerfile carried. The app reads its
# OWN container's org.apache.camel.karavan/type label to classify it as "internal".
quarkus.container-image.labels."org.apache.camel.karavan/type"=internal
quarkus.container-image.labels."org.opencontainers.image.title"=karavan
quarkus.container-image.labels."org.opencontainers.image.description"=Apache Camel Karavan
quarkus.container-image.labels."org.opencontainers.image.url"=https://camel.apache.org
quarkus.container-image.labels."org.opencontainers.image.licenses"=Apache 2.0
quarkus.jib.base-jvm-image=${BASE_IMAGE:bellsoft/liberica-runtime-container:jre-21-slim-glibc}
quarkus.devservices.enabled=false

quarkus.kubernetes-client.trust-certs=true

quarkus.kubernetes-client.connection-timeout=2000
quarkus.kubernetes-client.request-timeout=10000
quarkus.kubernetes-client.devservices.enabled=false

%public.quarkus.swagger-ui.always-include=true

quarkus.quinoa.enable-spa-routing=true
quarkus.quinoa.ci=false
quarkus.quinoa.package-manager-install=true
quarkus.quinoa.package-manager-install.node-version=24.11.1
quarkus.quinoa.dev-server.port=3003
quarkus.quinoa.dev-server.check-timeout=60000
quarkus.quinoa.ignored-path-prefixes=/ui,/public,/api/,/auth,/logout,/platform
quarkus.quinoa.package-manager-command.build-env.NODE_OPTIONS=--max-old-space-size=4096


karavan.datasource.username=karavan
karavan.datasource.password=K@r@v@n418
karavan.datasource.url=jdbc:postgresql://postgres:5432/karavan
karavan.datasource.schemas=public

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${KARAVAN_DATASOURCE_USERNAME:${karavan.datasource.username}}
quarkus.datasource.password=${KARAVAN_DATASOURCE_PASSWORD:${karavan.datasource.password}}
quarkus.datasource.jdbc.url=${KARAVAN_DATASOURCE_URL:${karavan.datasource.url}}
quarkus.datasource.jdbc.max-size=13
quarkus.flyway.schemas=${KARAVAN_DATASOURCE_SCHEMAS:${karavan.datasource.schemas}}
quarkus.flyway.locations=classpath:database
quarkus.flyway.clean-disabled=true
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=1.0
quarkus.flyway.table=flyway_history
quarkus.flyway.active=${KARAVAN_FLYWAY_ACTIVE:true}
quarkus.hibernate-orm.active=${KARAVAN_HIBERNATE_ORM_ACTIVE:true}

